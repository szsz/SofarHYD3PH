views:
  - title: Home
    sections:
      - type: grid
        cards:
          - type: custom:power-flow-card-plus
            entities:
              battery:
                entity: sensor.sofarhyd3ph_battery_power_total
                state_of_charge: sensor.sofarhyd3ph_battery_soc_average
                invert_state: true
              grid:
                entity: sensor.sofarhyd3ph_pcc_active_power_total
                secondary_info: {}
                invert_state: true
              solar:
                entity: sensor.sofarhyd3ph_pv_power_total
                display_zero_state: true
                secondary_info: {}
            clickable_entities: true
            display_zero_lines: true
            use_new_flow_rate_model: true
            w_decimals: 0
            kw_decimals: 1
            min_flow_rate: 0.75
            max_flow_rate: 6
            max_expected_power: 2000
            min_expected_power: 0.01
            watt_threshold: 1000
            transparency_zero_lines: 0
            sort_individual_devices: false
          - type: history-graph
            entities:
              - entity: sensor.sofarhyd3ph_battery_soc_average
            hours_to_show: 48
            grid_options:
              columns: 12
              rows: auto
          - type: entities
            entities:
              - entity: sensor.sofarhyd3ph_pv_power_total
              - entity: sensor.sofarhyd3ph_battery_power_total
              - entity: sensor.sofarhyd3ph_pcc_active_power_total
              - entity: sensor.sofarhyd3ph_output_active_power_total
              - entity: sensor.sofarhyd3ph_load_active_power
          - type: markdown
            content: |2-
               - PV Power: power generated by solar panels
               - Battery Power: charging (+) or discharging (-) battery
               - PCC Power: grid exchange (- export / + import)
               - Output Power: normal inverter output (non-UPS circuits)
               - Load Power: uninterrupted/critical load (UPS-backed circuits)
                 → Sum of Load + Output = total household power consumption
            text_only: true
          - type: heading
            heading: Timeline
            heading_style: title
          - chart_type: line
            period: 5minute
            type: statistics-graph
            entities:
              - sensor.sofarhyd3ph_pv_power_total
              - sensor.sofarhyd3ph_battery_power_total
              - sensor.sofarhyd3ph_pcc_active_power_total
              - sensor.sofarhyd3ph_output_active_power_total
              - sensor.sofarhyd3ph_load_active_power
            stat_types:
              - mean
            days_to_show: 2
            grid_options:
              columns: 24
              rows: auto
            title: Home Power 5min moving average
          - type: history-graph
            entities:
              - entity: sensor.sofarhyd3ph_pv_power_total
              - entity: sensor.sofarhyd3ph_battery_power_total
              - entity: sensor.sofarhyd3ph_pcc_active_power_total
              - entity: sensor.sofarhyd3ph_output_active_power_total
              - entity: sensor.sofarhyd3ph_load_active_power
            grid_options:
              columns: 24
              rows: auto
            hours_to_show: 3
            title: Home Power
        column_span: 4
    header: {}
