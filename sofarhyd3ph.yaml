# Sofar HYD 3PH RS485 Modbus Integration
#
# Exposes inverter data to Home Assistant:
# - PV Power: power generated by solar panels
# - Battery Power: charging (+) or discharging (-) battery
# - PCC Power: grid exchange (- export / + import)
# - Load Power: uninterrupted/critical load (UPS-backed circuits)
# - Output Power: normal inverter output (non-UPS circuits)
#   → Sum of Load + Output = total household power consumption
#
# Also includes daily & total energy counters (kWh) and grid/output frequencies (Hz).
# Designed for Sofar HYD 3-phase devices, with correct scaling and
# Home Assistant Energy Dashboard compatibility
# (device_class: energy, state_class: total_increasing).

# works on LILYGO ESP32 CAN RS485 device

esphome:
  name: sofarhyd3ph
  friendly_name: SofarHYD3PH

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret SofarHYD3PHAPIKey

ota:
  - platform: esphome
    password: !secret SofarHYD3PHOTA

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Sofarrs485Sec2 Fallback Hotspot"
    password: "CmFNykHyE6D5"

    
# ----------------- Your board pins -----------------
# RS485 TX = 22, RX = 21
# MAX13487E: RE pin = 17, SHUTDOWN pin = 19
# Boost enable (for RS485/CAN power) = 16

# Keep the boost supply and transceiver enabled
switch:
  - platform: gpio
    id: boost_enable
    pin: 16
    restore_mode: ALWAYS_ON
    internal: true

  - platform: gpio
    id: rs485_shutdown_disable
    pin: 19
    restore_mode: ALWAYS_ON
    internal: true

  - platform: gpio
    id: rs485_receive_enable
    pin: 17
    restore_mode: ALWAYS_ON
    internal: true

# UART1 for RS-485
uart:
  id: uart_bus
  tx_pin: 22
  rx_pin: 21
  baud_rate: 9600
  parity: NONE
  stop_bits: 1

# Modbus RTU over that UART
modbus:
  id: modbus1
  uart_id: uart_bus

modbus_controller:
  - id: sofar
    address: 0x01        # adjust if inverter uses another slave ID
    modbus_id: modbus1
    update_interval: 10s
    command_throttle: 200ms
    # flow_control_pin: 17   # uncomment if you get timeouts

text_sensor:
  - platform: version
    name: "ESPHome Version"

sensor:
  - platform: uptime
    name: "Uptime Seconds"
    
  # 05C4 Power_PV_Total (U16, 0.1 kW)
  - platform: modbus_controller
    modbus_controller_id: sofar
    name: "PV Power Total"
    id: power_pv_total
    register_type: holding
    address: 0x05C4
    value_type: U_WORD
    unit_of_measurement: "kW"
    accuracy_decimals: 1
    device_class: power
    state_class: measurement
    filters:
      - lambda: |-
          if (isnan(x)) {
            return NAN;
          }
          if (x > 1e9f || x < -1e9f) {
            return NAN;
          }
          return x * 0.1f;

  # 0504 ActivePower_Load_Total (I16, 0.01 kW)
